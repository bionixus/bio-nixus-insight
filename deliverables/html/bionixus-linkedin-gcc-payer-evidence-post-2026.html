<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200">
  <title>BioNixus LinkedIn Post — GCC Payer Evidence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 627px;
      overflow: hidden;
      background: #101C30;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
    }
    .card {
      position: relative;
      width: 1200px;
      height: 627px;
      background: linear-gradient(145deg, #101C30 0%, #0a1424 55%, #152a45 100%);
      color: #ffffff;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle at 70% 30%, rgba(245, 165, 3, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .kicker {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #F5A503;
      margin-bottom: 28px;
    }
    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.15;
      max-width: 920px;
      letter-spacing: -0.02em;
    }
    .headline em {
      font-style: italic;
      color: #F5A503;
    }
    .rule {
      width: 96px;
      height: 4px;
      background: #F5A503;
      margin: 36px 0 28px;
    }
    .subline {
      font-size: 22px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.82);
      max-width: 780px;
      font-weight: 400;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding-top: 28px;
    }
    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .logo-text span {
      color: #F5A503;
    }
    .tagline {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.55);
      text-align: right;
      max-width: 420px;
      line-height: 1.4;
    }
    .badge-row {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    .badge {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 14px;
      border: 1px solid rgba(245, 165, 3, 0.35);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.04);
    }
  </style>
</head>
<body>
  <article class="card" role="img" aria-label="BioNixus LinkedIn post graphic: Payer-grade evidence before the GCC committee. Healthcare and pharmaceutical market research across MENA, LatAm, and Europe.">
    <div>
      <p class="kicker">Market Access Insight</p>
      <h1 class="headline">Payer-grade evidence<br>before the <em>GCC committee</em></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="subline">Three gaps launch teams miss — and how to localize HEOR dossiers for Gulf payers.</p>
      <div class="badge-row" aria-hidden="true">
        <span class="badge">HEOR</span>
        <span class="badge">GCC</span>
        <span class="badge">Pharmacoeconomics</span>
      </div>
    </div>
    <footer class="footer">
      <div class="logo-text">Bio<span>Nixus</span></div>
      <p class="tagline">Global healthcare &amp; pharmaceutical market research<br>across MENA, LatAm, and Europe</p>
    </footer>
  </article>
</body>
</html>
